<!doctype html>

<html lang="pt-br">
    <head>
        <meta charset="utf-8" />
        <meta content="width=device-width, initial-scale=1.0" name="viewport" />
        <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
        <link
            href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&amp;display=swap"
            rel="stylesheet"
        />
        <link
            href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap"
            rel="stylesheet"
        />
        <link
            href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
            rel="stylesheet"
        />
        <script id="tailwind-config">
            tailwind.config = {
                darkMode: "class",
                theme: {
                    extend: {
                        colors: {
                            primary: "#334D40",
                            secondary: "#dbd8cc",
                            "background-light": "#f7f7f7",
                            "background-dark": "#1b1a17",
                        },
                        fontFamily: {
                            display: ["Manrope"],
                        },
                        borderRadius: {
                            DEFAULT: "0.25rem",
                            lg: "0.5rem",
                            xl: "0.75rem",
                            full: "9999px",
                        },
                    },
                },
            };
        </script>
        <style>
            body {
                font-family: "Manrope", sans-serif;
            }
            .material-symbols-outlined {
                font-variation-settings:
                    "FILL" 0,
                    "wght" 400,
                    "GRAD" 0,
                    "opsz" 24;
            }
        </style>
    </head>
    <body
        class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 overflow-hidden"
    >
        <!-- Dashboard Background (Simulated) -->
        <div
            class="relative flex h-screen w-full flex-col opacity-50 pointer-events-none"
        >
            <header
                class="flex items-center justify-between border-b border-secondary/30 px-10 py-3 bg-white"
            >
                <div class="flex items-center gap-8">
                    <div class="flex items-center gap-4 text-primary">
                        <span class="material-symbols-outlined text-3xl"
                            >potted_plant</span
                        >
                        <h2
                            class="text-lg font-bold leading-tight tracking-tight"
                        >
                            Plant Store CMS
                        </h2>
                    </div>
                    <div
                        class="flex w-64 items-center rounded-lg bg-secondary/20 px-3 py-2"
                    >
                        <span
                            class="material-symbols-outlined text-slate-500 mr-2"
                            >search</span
                        >
                        <span class="text-slate-400">Search products...</span>
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <span
                        class="material-symbols-outlined p-2 bg-secondary/20 rounded-lg"
                        >notifications</span
                    >
                    <div
                        class="size-10 rounded-full bg-secondary"
                        data-alt="User profile avatar placeholder"
                    ></div>
                </div>
            </header>
            <main class="flex flex-1 overflow-hidden">
                <aside
                    class="w-64 border-r border-secondary/30 p-6 flex flex-col gap-2 bg-white"
                >
                    <div
                        class="flex items-center gap-3 px-3 py-2 text-slate-600"
                    >
                        <span class="material-symbols-outlined">dashboard</span>
                        Dashboard
                    </div>
                    <div
                        class="flex items-center gap-3 px-3 py-2 text-slate-600"
                    >
                        <span class="material-symbols-outlined"
                            >inventory_2</span
                        >
                        Estoque
                    </div>
                    <div
                        class="flex items-center gap-3 px-3 py-2 bg-primary/10 text-primary rounded-lg font-bold"
                    >
                        <span class="material-symbols-outlined">category</span>
                        Categorias
                    </div>
                    <div
                        class="flex items-center gap-3 px-3 py-2 text-slate-600"
                    >
                        <span class="material-symbols-outlined"
                            >shopping_cart</span
                        >
                        Pedidos
                    </div>
                </aside>
                <section class="flex-1 p-10">
                    <div class="flex justify-between items-center mb-8">
                        <h1 class="text-3xl font-bold">Categorias</h1>
                        <button
                            class="bg-primary text-white px-4 py-2 rounded-lg"
                        >
                            + Nova Categoria
                        </button>
                    </div>
                    <div class="grid grid-cols-3 gap-6">
                        <div
                            class="h-32 bg-white rounded-xl border border-secondary/30 shadow-sm p-4"
                        ></div>
                        <div
                            class="h-32 bg-white rounded-xl border border-secondary/30 shadow-sm p-4"
                        ></div>
                        <div
                            class="h-32 bg-white rounded-xl border border-secondary/30 shadow-sm p-4"
                        ></div>
                    </div>
                </section>
            </main>
        </div>
        <!-- Modal Overlay -->
        <div
            class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/60 backdrop-blur-sm"
        >
            <!-- Modal Card -->
            <div
                class="w-full max-w-lg bg-white dark:bg-slate-900 rounded-xl shadow-2xl border border-secondary/20 overflow-hidden"
            >
                <!-- Modal Header -->
                <div
                    class="flex items-center justify-between px-6 py-4 border-b border-secondary/20"
                >
                    <div class="flex items-center gap-3">
                        <span class="material-symbols-outlined text-primary"
                            >add_circle</span
                        >
                        <h3
                            class="text-xl font-bold text-slate-900 dark:text-slate-100"
                        >
                            Nova Categoria
                        </h3>
                    </div>
                    <button
                        class="text-slate-400 hover:text-slate-600 transition-colors"
                    >
                        <span class="material-symbols-outlined">close</span>
                    </button>
                </div>
                <!-- Modal Body -->
                <div class="p-6 space-y-6">
                    <!-- Field: Nome -->
                    <div class="space-y-2">
                        <label
                            class="block text-sm font-semibold text-slate-700 dark:text-slate-300"
                            for="category-name"
                        >
                            Nome da Categoria
                        </label>
                        <input
                            class="w-full rounded-lg border-secondary/40 bg-white dark:bg-slate-800 focus:border-primary focus:ring-1 focus:ring-primary py-3 px-4 text-slate-900 dark:text-slate-100 placeholder:text-slate-400"
                            id="category-name"
                            placeholder="Ex: Suculentas, Samambaias..."
                            type="text"
                        />
                    </div>
                    <!-- Field: Descrição -->
                    <div class="space-y-2">
                        <label
                            class="block text-sm font-semibold text-slate-700 dark:text-slate-300"
                            for="category-desc"
                        >
                            Descrição
                        </label>
                        <textarea
                            class="w-full rounded-lg border-secondary/40 bg-white dark:bg-slate-800 focus:border-primary focus:ring-1 focus:ring-primary py-3 px-4 text-slate-900 dark:text-slate-100 placeholder:text-slate-400 resize-none"
                            id="category-desc"
                            placeholder="Descreva brevemente as características desta categoria de plantas..."
                            rows="4"
                        ></textarea>
                    </div>
                    <!-- Field: Toggle Active -->
                    <div class="flex items-center justify-between py-2">
                        <div class="flex flex-col">
                            <span
                                class="text-sm font-semibold text-slate-700 dark:text-slate-300"
                                >Categoria Ativa</span
                            >
                            <span class="text-xs text-slate-500"
                                >A categoria ficará visível na loja
                                imediatamente.</span
                            >
                        </div>
                        <label
                            class="relative inline-flex items-center cursor-pointer"
                        >
                            <input
                                checked=""
                                class="sr-only peer"
                                type="checkbox"
                                value=""
                            />
                            <div
                                class="w-11 h-6 bg-slate-200 peer-focus:outline-none rounded-full peer dark:bg-slate-700 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all dark:border-gray-600 peer-checked:bg-primary"
                            ></div>
                        </label>
                    </div>
                </div>
                <!-- Modal Footer -->
                <div
                    class="flex items-center justify-end gap-3 px-6 py-4 bg-slate-50 dark:bg-slate-800/50 border-t border-secondary/20"
                >
                    <button
                        class="px-5 py-2.5 rounded-lg text-sm font-bold text-slate-600 border border-secondary hover:bg-slate-100 transition-colors"
                    >
                        Cancelar
                    </button>
                    <button
                        class="px-6 py-2.5 rounded-lg text-sm font-bold text-white bg-primary hover:opacity-90 shadow-md shadow-primary/20 transition-all flex items-center gap-2"
                    >
                        <span class="material-symbols-outlined text-sm"
                            >save</span
                        >
                        Salvar Categoria
                    </button>
                </div>
            </div>
        </div>
    </body>
</html>
